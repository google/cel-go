description: "Nested rule tests for unconditional chaining"
section:
  - name: "chaining"
    tests:
      - name: "sub_rule_match_greater"
        input:
          x:
            expr: "4"
        output:
          value: "a"
      - name: "sub_rule_match_equal"
        input:
          x:
            expr: "3"
        output:
          value: "b"
      - name: "parent_rule_fallback"
        input:
          x:
            expr: "2"
        output:
          value: "c"
