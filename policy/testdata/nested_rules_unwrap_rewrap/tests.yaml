description: "Nested rule tests for unwrapping optional child and rewrapping into optional parent"
section:
  - name: "unwrap_rewrap"
    tests:
      - name: "outer_rule_no_match"
        input:
          x:
            expr: "2"
          y:
            expr: "1"
        output:
          expr: "optional.none()"
      - name: "outer_match_innter_match"
        input:
          x:
            expr: "1"
          y:
            expr: "1"
        output:
          expr: "optional.of('a')"
      - name: "outer_match_inner_fallthrough"
        input:
          x:
            expr: "1"
          y:
            expr: "2"
        output:
          expr: "optional.of('b')"
